name: selftest
on: [push, pull_request]
jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: python -m py_compile skills/onexus/scripts/*.py
      - run: python skills/onexus/scripts/okf_selftest.py
